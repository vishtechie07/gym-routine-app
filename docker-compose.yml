services:
  postgres:
    image: postgres:16-alpine
    container_name: habitual-postgres
    environment:
      POSTGRES_DB: gymtracker
      POSTGRES_USER: gymtracker
      POSTGRES_PASSWORD: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - habitual_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymtracker -d gymtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  habitual_pgdata:
