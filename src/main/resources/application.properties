# Server
server.port=8080

# PostgreSQL (start: docker compose up -d)
spring.datasource.url=jdbc:postgresql://localhost:5432/gymtracker
spring.datasource.username=gymtracker
spring.datasource.password=gymtracker
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT (override in production)
app.jwt.secret=${JWT_SECRET:habitual-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-security}
app.jwt.expiration-ms=86400000

spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

logging.level.com.gymtracker=INFO
logging.level.org.springframework.security=INFO

# Motion Lab: YouTube Data API v3 (channel handles, no @ prefix)
lab.youtube.api-key=${YOUTUBE_API_KEY:}
lab.youtube.handles=HASfit,jeffnippard,RenaissancePeriodization,BESTEXERCISESCHANNEL
lab.youtube.max-videos-per-channel=100
